name: MetaMask Security Code Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    secrets:
      SECURITY_SCAN_METRICS_TOKEN:
        required: false
      APPSEC_BOT_SLACK_WEBHOOK:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    uses: MetaMask/action-security-code-scanner/.github/workflows/security-scan.yml@becb242930b3cc271c26da0280050db9c157e291 # v2.1.1
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      repo: ${{ github.repository }}
      scanner-ref: 'becb242930b3cc271c26da0280050db9c157e291' # v2.1.1
      paths-ignored: |
        node_modules
        **/node_modules/**
        **/__snapshots__/**
        __snapshots_linux__
        **/__stories__/**
        .storybook/
        **/*.test.ts
        **/*.test.tsx
        **/*.test.js
        **/*.test.jsx
        **/*.spec.ts
        **/*.spec.tsx
        **/*.spec.js
        **/*.spec.jsx
        **/test*/**
        **/e2e/**
        **/tests/**
      languages-config: |
        [
        ]
    secrets:
      project-metrics-token: ${{ secrets.SECURITY_SCAN_METRICS_TOKEN }}
      slack-webhook: ${{ secrets.APPSEC_BOT_SLACK_WEBHOOK }}
